apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: travelhub-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    # AWS: the NLB external IP is assigned automatically by the NGINX controller
spec:
  ingressClassName: nginx
  rules:
    - host: api.travelhub.com
      http:
        paths:
          - path: /auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: login-handler-ms-external
                port:
                  number: 8001
          - path: /users(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: users-ms-external
                port:
                  number: 8004
    - host: d1iioxb0yhodky.cloudfront.net
      http:
        paths:
          - path: /auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: login-handler-ms-external
                port:
                  number: 8001
          - path: /users(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: users-ms-external
                port:
                  number: 8004
---
# ExternalName services — bridge from default namespace to each ms namespace
apiVersion: v1
kind: Service
metadata:
  name: login-handler-ms-external
  namespace: default
spec:
  type: ExternalName
  externalName: login-handler-ms.login-handler-ms.svc.cluster.local
  ports:
    - port: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: users-ms-external
  namespace: default
spec:
  type: ExternalName
  externalName: users-ms.users-ms.svc.cluster.local
  ports:
    - port: 8004