apiVersion: v1
kind: Namespace
metadata:
  name: login-handler-ms
---
# ── Secret ────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: login-handler-ms-secret
  namespace: login-handler-ms
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://postgres:SecurePass123!@travelhub-prod-postgres.ci3w0yecas02.us-east-1.rds.amazonaws.com:5432/login_handler_db"
  JWT_SECRET_KEY: "secure_secret_api"
  INTERNAL_API_KEY: "secure_internal_api"
---
# ── ConfigMap ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: login-handler-ms-config
  namespace: login-handler-ms
data:
  APP_NAME: "login_handler_ms"
  APP_VERSION: "0.1.0"
  DEBUG: "false"
  HOST: "0.0.0.0"
  PORT: "8001"
  JWT_ALGORITHM: "HS256"
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
---
# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: login-handler-ms
  namespace: login-handler-ms
  labels:
    app: login-handler-ms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: login-handler-ms
  template:
    metadata:
      labels:
        app: login-handler-ms
    spec:
      initContainers:
        - name: wait-for-db
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h travelhub-prod-postgres.ci3w0yecas02.us-east-1.rds.amazonaws.com -p 5432 -U postgres; do
                echo "Waiting for RDS..."; sleep 3
              done
              echo "RDS ready!"
      containers:
        - name: login-handler-ms
          image: 780522923809.dkr.ecr.us-east-1.amazonaws.com/travelhub/login-handler-ms:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: login-handler-ms-config
            - secretRef:
                name: login-handler-ms-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
# ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: login-handler-ms
  namespace: login-handler-ms
spec:
  selector:
    app: login-handler-ms
  ports:
    - port: 8001
      targetPort: 8001