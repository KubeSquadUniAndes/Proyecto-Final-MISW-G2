name: Build & Deploy to EKS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to build & deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - users-ms
          - login-handler-ms
          - reservasms
          - detectoranomaliasms
          - hospedajesms
          - notificacionesms

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER: travelhub-prod

jobs:
  # ── Build & Push users-ms ─────────────────────────────────────────────────
  build-users-ms:
    name: Build users-ms
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true) || (github.event_name == 'workflow_dispatch' && (github.event.inputs.service == 'users-ms' || github.event.inputs.service == 'all')) }}
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push users-ms
        id: build
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE=$ECR_REGISTRY/travelhub/users-ms:$IMAGE_TAG
          docker build -t $IMAGE ./users_ms
          docker push $IMAGE
          docker tag $IMAGE $ECR_REGISTRY/travelhub/users-ms:latest
          docker push $ECR_REGISTRY/travelhub/users-ms:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  # ── Build & Push login-handler-ms ─────────────────────────────────────────
  build-login-handler-ms:
    name: Build login-handler-ms
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true) || (github.event_name == 'workflow_dispatch' && (github.event.inputs.service == 'login-handler-ms' || github.event.inputs.service == 'all')) }}
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push login-handler-ms
        id: build
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE=$ECR_REGISTRY/travelhub/login-handler-ms:$IMAGE_TAG
          docker build -t $IMAGE ./login_handler_ms
          docker push $IMAGE
          docker tag $IMAGE $ECR_REGISTRY/travelhub/login-handler-ms:latest
          docker push $ECR_REGISTRY/travelhub/login-handler-ms:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  # ── Build & Push hospedajesms ─────────────────────────────────────────────
  build-hospedajesms:
    name: Build hospedajesms
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true) || (github.event_name == 'workflow_dispatch' && (github.event.inputs.service == 'hospedajesms' || github.event.inputs.service == 'all')) }}
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push hospedajesms
        id: build
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE=$ECR_REGISTRY/travelhub/hospedajesms:$IMAGE_TAG
          docker build -t $IMAGE ./hospedajes_ms
          docker push $IMAGE
          docker tag $IMAGE $ECR_REGISTRY/travelhub/hospedajesms:latest
          docker push $ECR_REGISTRY/travelhub/hospedajesms:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  # ── Build & Push reservasms ───────────────────────────────────────────────
  build-reservasms:
    name: Build reservasms
    runs-on: ubuntu-latest
    if: false # temporalmente deshabilitado
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push reservasms
        id: build
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE=$ECR_REGISTRY/travelhub/reservasms:$IMAGE_TAG
          docker build -t $IMAGE ./reservas_ms
          docker push $IMAGE
          docker tag $IMAGE $ECR_REGISTRY/travelhub/reservasms:latest
          docker push $ECR_REGISTRY/travelhub/reservasms:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  # ── Build & Push detectoranomaliasms ──────────────────────────────────────
  build-detectoranomaliasms:
    name: Build detectoranomaliasms
    runs-on: ubuntu-latest
    if: false # temporalmente deshabilitado
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push detectoranomaliasms
        id: build
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE=$ECR_REGISTRY/travelhub/detectoranomaliasms:$IMAGE_TAG
          docker build -t $IMAGE ./detector_anomalias_ms
          docker push $IMAGE
          docker tag $IMAGE $ECR_REGISTRY/travelhub/detectoranomaliasms:latest
          docker push $ECR_REGISTRY/travelhub/detectoranomaliasms:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  # ── Build & Push hospedajesms ─────────────────────────────────────────────
  build-hospedajesms:
    name: Build hospedajesms
    runs-on: ubuntu-latest
    if: false # temporalmente deshabilitado
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push hospedajesms
        id: build
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE=$ECR_REGISTRY/travelhub/hospedajesms:$IMAGE_TAG
          docker build -t $IMAGE ./hospedajes_ms
          docker push $IMAGE
          docker tag $IMAGE $ECR_REGISTRY/travelhub/hospedajesms:latest
          docker push $ECR_REGISTRY/travelhub/hospedajesms:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  # ── Build & Push notificacionesms ─────────────────────────────────────────
  build-notificacionesms:
    name: Build notificacionesms
    runs-on: ubuntu-latest
    if: false # temporalmente deshabilitado
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push notificacionesms
        id: build
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE=$ECR_REGISTRY/travelhub/notificacionesms:$IMAGE_TAG
          docker build -t $IMAGE ./notificaciones_ms
          docker push $IMAGE
          docker tag $IMAGE $ECR_REGISTRY/travelhub/notificacionesms:latest
          docker push $ECR_REGISTRY/travelhub/notificacionesms:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  # ── Deploy to EKS (after builds complete) ─────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs:
      - build-users-ms
      - build-login-handler-ms
      - build-hospedajesms
      # - build-reservasms          # temporalmente deshabilitado
      # - build-detectoranomaliasms # temporalmente deshabilitado
      # - build-notificacionesms    # temporalmente deshabilitado
    if: |
      always() &&
      (
        needs.build-users-ms.result == 'success' ||
        needs.build-login-handler-ms.result == 'success' ||
        needs.build-hospedajesms.result == 'success'
      )
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws sts get-caller-identity
          aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER
          kubectl version --client
          kubectl get nodes || true

      - name: Apply k8s manifests in order
        run: |
          for f in $(ls k8s/partial/*.yaml | sort); do
            echo "Applying $f"
            kubectl apply -f "$f" --validate=false
          done

      - name: Restart deployments to pull new images
        run: |
          SERVICES=""
          if [[ "${{ needs.build-users-ms.result }}" == "success" ]]; then
            SERVICES="$SERVICES users-deployment"
          fi
          if [[ "${{ needs.build-login-handler-ms.result }}" == "success" ]]; then
            SERVICES="$SERVICES login-handler-deployment"
          fi
          if [[ "${{ needs.build-hospedajesms.result }}" == "success" ]]; then
            SERVICES="$SERVICES hospedajes-deployment"
          fi
          #if [[ "${{ needs.build-reservasms.result }}" == "success" ]]; then
          #  SERVICES="$SERVICES reservas-deployment"
          #fi
          #if [[ "${{ needs.build-detectoranomaliasms.result }}" == "success" ]]; then
          #  SERVICES="$SERVICES detector-anomalias-deployment"
          #fi
          #if [[ "${{ needs.build-notificacionesms.result }}" == "success" ]]; then
          #  SERVICES="$SERVICES notificaciones-deployment"
          #fi
          for deploy in $SERVICES; do
            echo "Restarting $deploy..."
            kubectl rollout restart deployment/$deploy -n workloads
          done

      - name: Wait for deployments to be ready
        run: |
          # notificaciones-deployment reservas-deployment detector-anomalias-deployment
          for deploy in login-handler-deployment users-deployment hospedajes-deployment; do
            echo "Waiting for $deploy..."
            kubectl rollout status deployment/$deploy -n workloads --timeout=180s
          done

      - name: Run migrations
        run: |
          kubectl wait --for=condition=ready pod -l app=login-handler-app -n workloads --timeout=120s
          kubectl exec -n workloads deploy/login-handler-deployment -- python /app/run_migrations.py
          kubectl wait --for=condition=ready pod -l app=users-app -n workloads --timeout=120s
          kubectl exec -n workloads deploy/users-deployment -- python /app/run_migrations.py
          kubectl wait --for=condition=ready pod -l app=hospedajes-app -n workloads --timeout=120s
          kubectl exec -n workloads deploy/hospedajes-deployment -- python /app/run_migrations.py
          # kubectl wait --for=condition=ready pod -l app=detector-anomalias-app -n workloads --timeout=120s
          # kubectl exec -n workloads deploy/detector-anomalias-deployment -- python /app/run_migrations.py
          # kubectl wait --for=condition=ready pod -l app=reservas-app -n workloads --timeout=120s
          # kubectl exec -n workloads deploy/reservas-deployment -- python /app/run_migrations.py

  # ── E2E tests with Newman (después del deploy) ────────────────────────────
  e2e:
    name: E2E Tests (Newman)
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get NLB endpoint
        id: nlb
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER
          BASE_URL=$(kubectl get svc travelhub-gateway-istio -n workloads \
            -o jsonpath='http://{.status.loadBalancer.ingress[0].hostname}')
          echo "base_url=$BASE_URL" >> $GITHUB_OUTPUT

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run Newman tests
        run: |
          newman run postman/travelhub-collection.json \
            -e postman/travelhub-environment.json \
            --env-var base_url=${{ steps.nlb.outputs.base_url }} \
            -r cli,htmlextra \
            --reporter-htmlextra-export postman/report.html \
            --bail

      - name: Upload Newman report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-report-cd
          path: postman/report.html