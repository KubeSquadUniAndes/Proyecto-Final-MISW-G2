name: Build & Deploy to EKS

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to build & deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - users-ms
          - login-handler-ms
          - reservasms
          - detectoranomaliasms
          - hospedajesms
          - notificacionesms

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER: travelhub-prod

jobs:
  # ── Check CI status ───────────────────────────────────────────────────────
  check-ci:
    name: Check CI Status
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run'
    steps:
      - name: Check CI workflow result
        run: |
          if [[ "${{ github.event.workflow_run.conclusion }}" != "success" ]]; then
            echo "CI workflow failed or was cancelled. Skipping CD."
            exit 1
          fi
          echo "CI workflow passed. Proceeding with CD."

  # ── Build & Push users-ms ─────────────────────────────────────────────────
  build-users-ms:
    name: Build users-ms
    runs-on: ubuntu-latest
    needs: [check-ci]
    if: always() && (needs.check-ci.result == 'success' || github.event_name == 'workflow_dispatch')
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push users-ms
        id: build
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE=$ECR_REGISTRY/travelhub/usersms:$IMAGE_TAG
          docker build --platform linux/amd64 -t $IMAGE ./users_ms
          docker push $IMAGE
          docker tag $IMAGE $ECR_REGISTRY/travelhub/usersms:latest
          docker push $ECR_REGISTRY/travelhub/usersms:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  # ── Build & Push login-handler-ms ─────────────────────────────────────────
  build-login-handler-ms:
    name: Build login-handler-ms
    runs-on: ubuntu-latest
    needs: [check-ci]
    if: always() && (needs.check-ci.result == 'success' || github.event_name == 'workflow_dispatch')
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push login-handler-ms
        id: build
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE=$ECR_REGISTRY/travelhub/login-handler-ms:$IMAGE_TAG
          docker build --platform linux/amd64 -t $IMAGE ./login_handler_ms
          docker push $IMAGE
          docker tag $IMAGE $ECR_REGISTRY/travelhub/login-handler-ms:latest
          docker push $ECR_REGISTRY/travelhub/login-handler-ms:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  # ── Build & Push hospedajesms ─────────────────────────────────────────────
  build-hospedajesms:
    name: Build hospedajesms
    runs-on: ubuntu-latest
    needs: [check-ci]
    if: always() && (needs.check-ci.result == 'success' || github.event_name == 'workflow_dispatch')
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push hospedajesms
        id: build
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE=$ECR_REGISTRY/travelhub/hospedajesms:$IMAGE_TAG
          docker build --platform linux/amd64 -t $IMAGE ./hospedajes_ms
          docker push $IMAGE
          docker tag $IMAGE $ECR_REGISTRY/travelhub/hospedajesms:latest
          docker push $ECR_REGISTRY/travelhub/hospedajesms:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  # ── Build & Push reservasms ───────────────────────────────────────────────
  build-reservasms:
    name: Build reservasms
    runs-on: ubuntu-latest
    needs: [check-ci]
    if: always() && (needs.check-ci.result == 'success' || github.event_name == 'workflow_dispatch')
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push reservasms
        id: build
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE=$ECR_REGISTRY/travelhub/reservasms:$IMAGE_TAG
          docker build --platform linux/amd64 -t $IMAGE ./reservas_ms
          docker push $IMAGE
          docker tag $IMAGE $ECR_REGISTRY/travelhub/reservasms:latest
          docker push $ECR_REGISTRY/travelhub/reservasms:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  # ── Build & Push detectoranomaliasms ──────────────────────────────────────
  build-detectoranomaliasms:
    name: Build detectoranomaliasms
    runs-on: ubuntu-latest
    needs: [check-ci]
    if: always() && (needs.check-ci.result == 'success' || github.event_name == 'workflow_dispatch')
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push detectoranomaliasms
        id: build
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE=$ECR_REGISTRY/travelhub/detectoranomaliasms:$IMAGE_TAG
          docker build --platform linux/amd64 -t $IMAGE ./detector_anomalias_ms
          docker push $IMAGE
          docker tag $IMAGE $ECR_REGISTRY/travelhub/detectoranomaliasms:latest
          docker push $ECR_REGISTRY/travelhub/detectoranomaliasms:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  # ── Build & Push notificacionesms ─────────────────────────────────────────
  build-notificacionesms:
    name: Build notificacionesms
    runs-on: ubuntu-latest
    needs: [check-ci]
    if: always() && (needs.check-ci.result == 'success' || github.event_name == 'workflow_dispatch')
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push notificacionesms
        id: build
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE=$ECR_REGISTRY/travelhub/notificacionesms:$IMAGE_TAG
          docker build --platform linux/amd64 -t $IMAGE ./notificaciones_ms
          docker push $IMAGE
          docker tag $IMAGE $ECR_REGISTRY/travelhub/notificacionesms:latest
          docker push $ECR_REGISTRY/travelhub/notificacionesms:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  # ── Deploy to EKS (after builds complete) ─────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs:
      - build-users-ms
      - build-login-handler-ms
      - build-hospedajesms
      - build-reservasms
      - build-detectoranomaliasms
      - build-notificacionesms
    if: |
      always() &&
      (
        needs.build-users-ms.result == 'success' ||
        needs.build-login-handler-ms.result == 'success' ||
        needs.build-hospedajesms.result == 'success' ||
        needs.build-reservasms.result == 'success' ||
        needs.build-detectoranomaliasms.result == 'success' ||
        needs.build-notificacionesms.result == 'success'
      )
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws sts get-caller-identity
          aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER
          kubectl version --client
          kubectl get nodes || true

      - name: Apply k8s manifests in order
        run: |
          for f in $(ls k8s/partial/*.yaml | sort); do
            echo "Applying $f"
            kubectl apply -f "$f" --validate=false
          done

      - name: Restart deployments to pull new images
        run: |
          SERVICES=""
          if [[ "${{ needs.build-users-ms.result }}" == "success" ]]; then
            SERVICES="$SERVICES users-deployment"
          fi
          if [[ "${{ needs.build-login-handler-ms.result }}" == "success" ]]; then
            SERVICES="$SERVICES login-handler-deployment"
          fi
          if [[ "${{ needs.build-hospedajesms.result }}" == "success" ]]; then
            SERVICES="$SERVICES hospedajes-deployment"
          fi
          if [[ "${{ needs.build-reservasms.result }}" == "success" ]]; then
            SERVICES="$SERVICES reservas-deployment"
          fi
          if [[ "${{ needs.build-detectoranomaliasms.result }}" == "success" ]]; then
            SERVICES="$SERVICES detector-anomalias-deployment"
          fi
          if [[ "${{ needs.build-notificacionesms.result }}" == "success" ]]; then
            SERVICES="$SERVICES notificaciones-deployment"
          fi
          for deploy in $SERVICES; do
            echo "Restarting $deploy..."
            kubectl rollout restart deployment/$deploy -n workloads
          done

      - name: Wait for deployments to be ready
        run: |
          for deploy in login-handler-deployment users-deployment hospedajes-deployment \
                        reservas-deployment detector-anomalias-deployment notificaciones-deployment; do
            echo "Waiting for $deploy..."
            kubectl rollout status deployment/$deploy -n workloads --timeout=180s
          done

      - name: Run migrations
        run: |
          kubectl wait --for=condition=ready pod -l app=login-handler-app -n workloads --timeout=120s
          kubectl exec -n workloads deploy/login-handler-deployment -- python /app/run_migrations.py
          kubectl wait --for=condition=ready pod -l app=users-app -n workloads --timeout=120s
          kubectl exec -n workloads deploy/users-deployment -- python /app/run_migrations.py
          kubectl wait --for=condition=ready pod -l app=hospedajes-app -n workloads --timeout=120s
          kubectl exec -n workloads deploy/hospedajes-deployment -- python /app/run_migrations.py
          kubectl wait --for=condition=ready pod -l app=detector-anomalias-app -n workloads --timeout=120s
          kubectl exec -n workloads deploy/detector-anomalias-deployment -- \
            sh -c "env -u PYTHONPATH alembic -c /app/alembic.ini upgrade head"
          kubectl wait --for=condition=ready pod -l app=reservas-app -n workloads --timeout=120s
          kubectl exec -n workloads deploy/reservas-deployment -- \
            sh -c "cd /app && PYTHONPATH= alembic stamp head"

  # ── E2E tests with Newman (después del deploy) ────────────────────────────
  e2e:
    name: E2E Tests (Newman)
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run Newman tests (travelhub)
        run: |
          newman run postman/travelhub-collection.json \
            -e postman/travelhub-environment.json \
            --env-var base_url=${{ secrets.EKS_BASE_URL }} \
            -r cli,htmlextra \
            --reporter-htmlextra-export postman/report-travelhub.html \
            --insecure \
            --bail

      - name: Run Newman tests (reservas-ms)
        run: |
          newman run postman/reservas-ms-collection.json \
            -e postman/travelhub-environment.json \
            --env-var base_url=${{ secrets.EKS_BASE_URL }} \
            --env-var test_email=newman.test@example.com \
            --env-var test_password=SecurePass123! \
            --env-var hotel_email=hotel-admin@example.com \
            --env-var hotel_password=SecurePass123! \
            --env-var hotel_id=${{ secrets.RESERVAS_HOTEL_ID }} \
            --env-var room_id=${{ secrets.RESERVAS_ROOM_ID }} \
            -r cli,htmlextra \
            --reporter-htmlextra-export postman/report-reservas.html \
            --insecure \
            --bail

      - name: Upload Newman report (travelhub)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-report-travelhub
          path: postman/report-travelhub.html

      - name: Upload Newman report (reservas-ms)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-report-reservas
          path: postman/report-reservas.html