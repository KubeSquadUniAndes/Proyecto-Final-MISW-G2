name: CI

on:
  push:
    branches: [main, develop, 'feature/**', 'hotfix/**']
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: detector_anomalias_ms
            test_path: tests/
            src_path: src
            mypy_path: src/domain src/application
          - service: login_handler_ms
            test_path: tests/
            src_path: src
            mypy_path: src/domain src/application
          - service: notificaciones_ms
            test_path: tests/
            src_path: src
            mypy_path: src/application
          - service: reservas_ms
            test_path: src/tests/
            src_path: src
            mypy_path: src/domain src/application
          - service: hospedajes_ms
            test_path: tests/
            src_path: src
            mypy_path: src/domain src/application

    env:
      PYTHONPATH: ${{ github.workspace }}/${{ matrix.service }}

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Lint ────────────────────────────────────────────────────────────────
      - name: Lint (ruff)
        run: python -m ruff check ${{ matrix.src_path }}

      - name: Format check (ruff)
        run: python -m ruff format --check ${{ matrix.src_path }}

      # ── Type check ──────────────────────────────────────────────────────────
      - name: Type check (mypy)
        run: python -m mypy ${{ matrix.mypy_path }} --explicit-package-bases

      # ── Security ────────────────────────────────────────────────────────────
      - name: SAST (bandit)
        run: python -m bandit -r ${{ matrix.src_path }} -ll -q

      - name: Dependency vulnerabilities (pip-audit)
        run: python -m pip_audit -r requirements.txt --skip-editable --ignore-vuln CVE-2026-4539 --ignore-vuln GHSA-6w46-j5rx-g56g

      # ── Unit tests + coverage ────────────────────────────────────────────────
      - name: Unit tests
        env:
          DEBUG: "false"
          PYTHONPATH: ${{ github.workspace }}/${{ matrix.service }}
        run: |
          python -m pytest ${{ matrix.test_path }} \
            --ignore=${{ matrix.test_path }}test_infrastructure.py \
            --cov=src/domain \
            --cov=src/application \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/coverage.xml

  # ── E2E tests with Newman (solo en push a main, requiere EKS desplegado) ────
  e2e:
    name: E2E Tests (Newman)
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run Newman tests
        run: |
          newman run postman/travelhub-collection.json \
            -e postman/travelhub-environment.json \
            --env-var base_url=${{ secrets.EKS_BASE_URL }} \
            -r cli,htmlextra \
            --reporter-htmlextra-export postman/report.html \
            --bail

      - name: Upload Newman report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: newman-report
          path: postman/report.html