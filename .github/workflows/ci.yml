name: CI

on:
  push:
    branches: [main, develop, 'feature/**', 'hotfix/**']
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: detector_anomalias_ms
            test_path: tests/
            src_path: src
            mypy_path: src/domain src/application
          - service: login_handler_ms
            test_path: tests/
            src_path: src
            mypy_path: src/domain src/application
          - service: notificaciones_ms
            test_path: tests/
            src_path: src
            mypy_path: src/application
          - service: reservas_ms
            test_path: src/tests/
            src_path: src
            mypy_path: src/domain src/application

    env:
      PYTHONPATH: ${{ github.workspace }}/${{ matrix.service }}

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Lint ────────────────────────────────────────────────────────────────
      - name: Lint (ruff)
        run: ruff check ${{ matrix.src_path }}

      - name: Format check (ruff)
        run: ruff format --check ${{ matrix.src_path }}

      # ── Type check ──────────────────────────────────────────────────────────
      - name: Type check (mypy)
        run: mypy ${{ matrix.mypy_path }}

      # ── Security ────────────────────────────────────────────────────────────
      - name: SAST (bandit)
        run: bandit -r ${{ matrix.src_path }} -ll -q

      - name: Dependency vulnerabilities (pip-audit)
        run: pip-audit -r requirements.txt --skip-editable --ignore-vuln CVE-2026-4539

      # ── Unit tests + coverage ────────────────────────────────────────────────
      - name: Unit tests
        env:
          DEBUG: "false"
          PYTHONPATH: ${{ github.workspace }}/${{ matrix.service }}
        run: |
          pytest ${{ matrix.test_path }} \
            --cov=${{ matrix.src_path }} \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/coverage.xml