---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: travelhub-tls-cert
  namespace: workloads
spec:
  secretName: travelhub-tls-cert
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
  duration: 8760h   # 1 year
  renewBefore: 720h # renew 30 days before expiry
  dnsNames:
  - travelhub.local
  - "*.travelhub.local"
