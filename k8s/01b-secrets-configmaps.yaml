apiVersion: v1
kind: ConfigMap
metadata:
  name: rds-config
  namespace: workloads
data:
  RDS_HOST: "travelhub-prod-postgres.ci3w0yecas02.us-east-1.rds.amazonaws.com"
  RDS_PORT: "5432"
---
# ── login-handler-ms ──────────────────────────────────────────────────────────
# Secret (login-handler-ms-secret) managed by External Secrets Operator
# see k8s/14-external-secrets.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: login-handler-ms-config
  namespace: workloads
data:
  APP_NAME: "login_handler_ms"
  APP_VERSION: "0.1.0"
  DEBUG: "false"
  HOST: "0.0.0.0"
  PORT: "8000"
  JWT_ALGORITHM: "HS256"
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
---
