###################################
# PostgreSQL Deployment (ephemeral, for minikube/dev)
# For production on EKS, switch to a StatefulSet with PVC
# or use Amazon RDS instead.
###################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
  namespace: workloads
  labels:
    app: postgres-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-db
  template:
    metadata:
      labels:
        app: postgres-db
    spec:
      nodeSelector:
        role: workloads
      terminationGracePeriodSeconds: 60
      containers:
      - name: postgres
        image: postgres:alpine3.22
        imagePullPolicy: IfNotPresent
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRES_DB
        # - name: PGDATA
        #   value: /var/lib/postgresql/data/pgdata
        ports:
        - name: postgres
          containerPort: 5432
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1"
            memory: "512Mi"
        readinessProbe:
          exec:
            command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 12
        livenessProbe:
          exec:
            command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 6
        # Uncomment for persistent storage (EKS with gp3 StorageClass):
        # volumeMounts:
        # - name: pgdata
        #   mountPath: /var/lib/postgresql/data
      # volumes:
      # - name: pgdata
      #   persistentVolumeClaim:
      #     claimName: pgdata-pvc
