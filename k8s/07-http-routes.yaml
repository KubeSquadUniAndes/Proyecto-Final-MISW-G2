## TravelHub users HTTPRoute
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: login-handler-route
  namespace: workloads
spec:
  parentRefs:
  - name: travelhub-gateway
    sectionName: https
  - name: travelhub-gateway
    sectionName: http
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /login-handler
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        add:
        - name: x-travelhub-header
          value: login-handler-service
    backendRefs:
    - name: login-handler-service
      port: 80
---
