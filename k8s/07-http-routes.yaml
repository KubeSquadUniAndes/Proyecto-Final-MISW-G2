###############################
## Detector anomalias HTTPRoute
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: detector-anomalias-route
  namespace: workloads
spec:
  parentRefs:
  - name: travelhub-gateway
    sectionName: https
  - name: travelhub-gateway
    sectionName: http
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /detector-anomalias
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: detector-anomalias-service
      port: 80
---
