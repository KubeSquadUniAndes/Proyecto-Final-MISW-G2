###################################
# HorizontalPodAutoscalers
#
# Memory-based scaling: scales up when memory exceeds 60% of requests.
# CPU-based scaling: also included as a safety net at 70%.
#
# For 5xx-based scaling: Istio ambient + waypoint exposes metrics.
# You need the Prometheus adapter to expose custom metrics to the
# HPA. The DestinationRules (08-destination-rules.yaml) handle
# the immediate response to 5xx errors via outlier detection
# (ejecting unhealthy pods), while the HPA adds NEW replicas
# when sustained load causes high memory/cpu.
###################################

# detector anomalias service HPA
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: detector-anomalias-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: detector-anomalias-deployment
  minReplicas: 1
  maxReplicas: 2
  metrics:
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 60
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Pods
        value: 1
        periodSeconds: 120
---
