###################################
# Ingress Gateway for EXTERNAL traffic.
# On AWS EKS this creates a Network Load Balancer automatically
# via the AWS Load Balancer Controller.
# The waypoint is for internal mesh traffic only —
# you STILL need this gateway for traffic entering the cluster.
###################################
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: travelhub-gateway
  namespace: default
  annotations:
    # AWS EKS: use NLB for the ingress gateway service
    # service.beta.kubernetes.io/aws-load-balancer-type: external
    # service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
    # service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
spec:
  gatewayClassName: istio
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: Same
