###################################
# detector-anomalias service
###################################
apiVersion: v1
kind: Service
metadata:
  name: detector-anomalias-service
  namespace: default
  labels:
    app: detector-anomalias-app
    istio.io/use-waypoint: waypoint-private
spec:
  type: ClusterIP
  selector:
    app: detector-anomalias-app
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 8000
---
