  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: hospedajes-ms-secret
    creationPolicy: Owner
    template:
      data:
        DATABASE_URL: "postgresql+asyncpg://postgres:{{ .rds_password }}@travelhub-prod-postgres.ci3w0yecas02.us-east-1.rds.amazonaws.com:5432/hospedajes_db?ssl=require"
        POSTGRES_USER: "postgres"
        POSTGRES_PASSWORD: "{{ .rds_password }}"
        POSTGRES_DB: "hospedajes_db"
        POSTGRES_HOST: "travelhub-prod-postgres.ci3w0yecas02.us-east-1.rds.amazonaws.com"
        POSTGRES_PORT: "5432"
        JWT_SECRET_KEY: "{{ .jwt_secret }}"
  data:
