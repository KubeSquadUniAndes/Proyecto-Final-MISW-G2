---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: workloads
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::780522923809:role/travelhub-external-secrets-role"
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: workloads
---
# ── reservas-ms-secret ────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: reservas-ms-external-secret
  namespace: workloads
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: reservas-ms-secret
    creationPolicy: Owner
    template:
      data:
        DATABASE_URL: "postgresql+asyncpg://postgres:{{ .rds_password }}@travelhub-prod-postgres.ci3w0yecas02.us-east-1.rds.amazonaws.com:5432/bookings_db?ssl=require"
        AES_ENCRYPTION_KEY: "{{ .aes_key }}"
        JWT_SECRET_KEY: "{{ .jwt_secret }}"
        DETECTOR_ANOMALIAS_MS_API_KEY: "{{ .internal_api_key }}"
  data:
  - secretKey: rds_password
    remoteRef:
      key: travelhub/rds/password
  - secretKey: aes_key
    remoteRef:
      key: travelhub/reservas/aes-key
  - secretKey: jwt_secret
    remoteRef:
      key: travelhub/app/jwt-secret
  - secretKey: internal_api_key
    remoteRef:
      key: travelhub/app/internal-api-key
---
# ── login-handler-ms-secret ───────────────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: login-handler-ms-external-secret
  namespace: workloads
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
