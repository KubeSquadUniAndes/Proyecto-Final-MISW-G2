    name: login-handler-ms-secret
    creationPolicy: Owner
    template:
      data:
        DATABASE_URL: "postgresql+asyncpg://postgres:{{ .rds_password }}@travelhub-prod-postgres.ci3w0yecas02.us-east-1.rds.amazonaws.com:5432/auth_db?ssl=require"
        JWT_SECRET_KEY: "{{ .jwt_secret }}"
        INTERNAL_API_KEY: "{{ .internal_api_key }}"
  data:
  - secretKey: rds_password
    remoteRef:
      key: travelhub/rds/password
  - secretKey: jwt_secret
    remoteRef:
      key: travelhub/app/jwt-secret
  - secretKey: internal_api_key
    remoteRef:
      key: travelhub/app/internal-api-key
---
