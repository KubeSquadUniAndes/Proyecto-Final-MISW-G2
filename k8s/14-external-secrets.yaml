---
# ── notificaciones-ms-secret ──────────────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: notificaciones-ms-external-secret
  namespace: workloads
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: notificaciones-ms-secret
    creationPolicy: Owner
    template:
      data:
        INTERNAL_API_KEY: "{{ .internal_api_key }}"
        SMTP_USER: "{{ .smtp_user }}"
        SMTP_PASSWORD: "{{ .smtp_password }}"
        SLACK_WEBHOOK_URL: ""
  data:
  - secretKey: internal_api_key
    remoteRef:
      key: travelhub/app/internal-api-key
  - secretKey: smtp_user
    remoteRef:
      key: travelhub/notificaciones/smtp-user
  - secretKey: smtp_password
    remoteRef:
      key: travelhub/notificaciones/smtp-password
