apiVersion: apps/v1
kind: Deployment
metadata:
  name: detector-anomalias-deployment
  namespace: workloads
  labels:
    app: detector-anomalias-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: detector-anomalias-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      labels:
        app: detector-anomalias-app
        version: v1
    spec:
      nodeSelector:
        role: workloads
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - detector-anomalias-app
              topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 30
      initContainers:
      - name: wait-for-postgres
        image: postgres:alpine3.22
        env:
        - name: RDS_HOST
          valueFrom:
            configMapKeyRef:
              name: rds-config
              key: RDS_HOST
        - name: RDS_PORT
          valueFrom:
            configMapKeyRef:
              name: rds-config
              key: RDS_PORT
        command: ["sh", "-c", "until pg_isready -h $RDS_HOST -p $RDS_PORT -U postgres; do echo 'waiting for RDS...'; sleep 2; done"]
      containers:
      - name: detector-anomalias
        image: 780522923809.dkr.ecr.us-east-1.amazonaws.com/travelhub/detectoranomaliasms:latest
        imagePullPolicy: Always
        envFrom:
          - configMapRef:
              name: detector-anomalias-ms-config
          - secretRef:
              name: detector-anomalias-ms-secret
        ports:
        - containerPort: 8000
          name: http
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 1000
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3
---
