apiVersion: apps/v1
kind: Deployment
metadata:
  name: detector-anomalias-deployment
  namespace: default
  labels:
    app: detector-anomalias-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: detector-anomalias-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: detector-anomalias-app
        version: v1
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - detector-anomalias-app
              topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 30
      initContainers:
      - name: wait-for-postgres
        image: postgres:alpine3.22
        command: ["sh", "-c", "until pg_isready -h postgresdb-service -p 5432 -U postgres; do echo 'waiting for postgres...'; sleep 2; done"]
      containers:
      - name: detector-anomalias
        image: 780522923809.dkr.ecr.us-east-1.amazonaws.com/travelhub/detector-anomalias:latest
        imagePullPolicy: Always
        env:
        - name: HOSPEDAJES_MS_URL
          value: "http://hospedajes-service"
        - name: POSTGRES_HOST
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRES_HOST
        - name: POSTGRES_PORT
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRES_PORT
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRES_DB
        ports:
        - containerPort: 8000
          name: http
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3
---
