apiVersion: apps/v1
kind: Deployment
metadata:
  name: notificaciones-deployment
  namespace: workloads
  labels:
    app: notificaciones-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notificaciones-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      labels:
        app: notificaciones-app
        version: v1
    spec:
      nodeSelector:
        role: workloads
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - notificaciones-app
              topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 30
      # notificaciones-ms has no database — remove init container
      containers:
      - name: notificacionesms
        image: 780522923809.dkr.ecr.us-east-1.amazonaws.com/travelhub/notificacionesms:latest
        imagePullPolicy: Always
        envFrom:
          - configMapRef:
              name: notificaciones-ms-config
          - secretRef:
              name: notificaciones-ms-secret
        volumeMounts:
        - name: firebase-sa
          mountPath: /app/firebase-service-account.json
          subPath: firebase-service-account.json
          readOnly: true
        ports:
        - containerPort: 8000
          name: http
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 1000
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3
      volumes:
      - name: firebase-sa
        secret:
          secretName: firebase-service-account
---
