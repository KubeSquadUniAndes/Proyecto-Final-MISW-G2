
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: travelhub-gateway
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "*"
---
###################################
# hospedajes destination rule and virtual service
###################################
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: hospedajes
spec:
  host: hospedajes-service
  subsets:
  - name: v1
    labels:
      version: v1
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: hospedajes-vs
spec:
  hosts:
  - "*"
  gateways:
  - travelhub-gateway
  http:
  - match:
    - uri:
        exact: "/hospedajes"
    - uri:
        prefix: "/hospedajes/"
    rewrite:
      uri: "/"
    route:
    - destination:
        host: hospedajes-service
        subset: v1
        port:
          number: 80
---
###################################
# users destination rule and virtual service
###################################
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: users
spec:
  host: users-service
  subsets:
  - name: v1
    labels:
      version: v1
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: users-vs
spec:
  hosts:
  - "*"
  gateways:
  - travelhub-gateway 
  http:
  - match:
    - uri:
        exact: "/users"
    - uri:
        prefix: "/users/"
    rewrite:
      uri: "/"
    route:
    - destination:
        host: users-service
        subset: v1
        port:
          number: 80

