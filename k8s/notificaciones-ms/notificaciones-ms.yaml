apiVersion: v1
kind: Namespace
metadata:
  name: notificaciones-ms
  labels:
    app.kubernetes.io/part-of: experiment
---
# ── Secrets ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: notificaciones-ms-secret
  namespace: notificaciones-ms
type: Opaque
stringData:
  INTERNAL_API_KEY: "change-internal-key-in-production"
  SMTP_USER: ""
  SMTP_PASSWORD: ""
  SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/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"
---
# ── ConfigMap ──────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: notificaciones-ms-config
  namespace: notificaciones-ms
data:
  APP_NAME: "notificaciones_ms"
  APP_VERSION: "0.1.0"
  DEBUG: "false"
  HOST: "0.0.0.0"
  PORT: "8003"
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  EMAIL_FROM: "alerts@experiment.local"
  EMAIL_TO: "security@experiment.local"
  SLACK_CHANNEL: "#security-alerts"
---
# ── Application ────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notificaciones-ms
  namespace: notificaciones-ms
  labels:
    app: notificaciones-ms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notificaciones-ms
  template:
    metadata:
      labels:
        app: notificaciones-ms
    spec:
      containers:
        - name: notificaciones-ms
          image: notificaciones_ms:latest    # Replace with your registry image
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8003
          envFrom:
            - configMapRef:
                name: notificaciones-ms-config
            - secretRef:
                name: notificaciones-ms-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: notificaciones-ms
  namespace: notificaciones-ms
spec:
  selector:
    app: notificaciones-ms
  ports:
    - port: 8003
      targetPort: 8003
---
# ── Ingress ────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: notificaciones-ms-ingress
  namespace: notificaciones-ms
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: api.experiment.local
      http:
        paths:
          - path: /notifications(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: notificaciones-ms
                port:
                  number: 8003