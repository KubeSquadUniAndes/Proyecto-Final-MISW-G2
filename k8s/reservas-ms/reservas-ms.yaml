apiVersion: v1
kind: Namespace
metadata:
  name: reservas-ms
  labels:
    app.kubernetes.io/part-of: experiment
---
# ── Secrets ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: reservas-ms-secret
  namespace: reservas-ms
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://postgres:yulilinda@192.168.1.6:5432/reservas_db"
  JWT_SECRET_KEY: "change-me-in-production"
  DETECTOR_ANOMALIAS_MS_API_KEY: "change-internal-key-in-production"
---
# ── ConfigMap ──────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: reservas-ms-config
  namespace: reservas-ms
data:
  APP_NAME: "reservas_ms"
  APP_VERSION: "0.1.0"
  DEBUG: "false"
  HOST: "0.0.0.0"
  PORT: "8000"
  JWT_ALGORITHM: "HS256"
  LOGIN_HANDLER_MS_URL: "http://login-handler-ms.login-handler-ms.svc.cluster.local:8001"
  DETECTOR_ANOMALIAS_MS_URL: "http://detector-anomalias-ms.detector-anomalias-ms.svc.cluster.local:8002"
---
apiVersion: v1
kind: Service
metadata:
  name: reservas-db
  namespace: reservas-ms
spec:
  selector:
    app: reservas-db
  ports:
    - port: 5432
      targetPort: 5432
---
# ── Application ────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservas-ms
  namespace: reservas-ms
  labels:
    app: reservas-ms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reservas-ms
  template:
    metadata:
      labels:
        app: reservas-ms
    spec:
      initContainers:
        - name: wait-for-db
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h 192.168.1.6 -p 5432 -U postgres; do
                echo "DB not ready, retrying..."; sleep 2
              done
              echo "DB ready!"
      containers:
        - name: reservas-ms
          image: reservas_ms:latest          # Replace with your registry image
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: reservas-ms-config
            - secretRef:
                name: reservas-ms-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: reservas-ms
  namespace: reservas-ms
spec:
  selector:
    app: reservas-ms
  ports:
    - port: 8000
      targetPort: 8000
---
# ── Ingress ────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: reservas-ms-ingress
  namespace: reservas-ms
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: api.experiment.local            # Change to your actual domain
      http:
        paths:
          - path: /reservas(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: reservas-ms
                port:
                  number: 8000