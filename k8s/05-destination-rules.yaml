###################################
# DestinationRules with outlier detection
#
# Outlier detection is the IMMEDIATE response to 5xx errors:
# - When a pod returns 3 consecutive 5xx errors, it gets ejected
#   from the load balancing pool for 30s.
# - This forces traffic to healthy replicas instantly.
# - Combined with HPA, new replicas are created if load is sustained.
###################################
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: detector-anomalias-dr
  namespace: default
spec:
  host: detector-anomalias-service.default.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 800
      http:
        h2UpgradePolicy: DEFAULT
        http1MaxPendingRequests: 500
        http2MaxRequests: 1000
        maxRequestsPerConnection: 10
        maxRetries: 3
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 5s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: hospedajes-dr
  namespace: default
spec:
  host: hospedajes-service.default.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 800
      http:
        h2UpgradePolicy: DEFAULT
        http1MaxPendingRequests: 500
        http2MaxRequests: 800
        maxRequestsPerConnection: 10
        maxRetries: 2
    outlierDetection:
      consecutive5xxErrors: 2
      interval: 5s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  subsets:
  - name: v1
    labels:
      version: v1
---
