###################################
# PodDisruptionBudgets
# Ensure at least 1 pod is always available during
# voluntary disruptions (node upgrades, scaling, etc.)
###################################
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: detector-anomalias-pdb
  namespace: default
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: detector-anomalias-app
---
