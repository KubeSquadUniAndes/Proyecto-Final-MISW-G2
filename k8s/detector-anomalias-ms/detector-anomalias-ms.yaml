apiVersion: v1
kind: Namespace
metadata:
  name: detector-anomalias-ms
  labels:
    app.kubernetes.io/part-of: experiment
---
# ── Secrets ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: detector-anomalias-ms-secret
  namespace: detector-anomalias-ms
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://postgres:yulilinda@192.168.58.127:5432/detector_anomalias_db"
  INTERNAL_API_KEY: "change-internal-key-in-production"
  LOGIN_HANDLER_MS_INTERNAL_API_KEY: "change-internal-key-in-production"
  NOTIFICACIONES_MS_API_KEY: "change-internal-key-in-production"
---
# ── ConfigMap ──────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: detector-anomalias-ms-config
  namespace: detector-anomalias-ms
data:
  APP_NAME: "detector_anomalias_ms"
  APP_VERSION: "0.1.0"
  DEBUG: "false"
  HOST: "0.0.0.0"
  PORT: "8002"
  RANDOM_ANOMALY_RATE: "0.30"
  MAX_BOOKINGS_PER_WINDOW: "5"
  MAX_DISTINCT_RESOURCES_PER_WINDOW: "4"
  FREQUENCY_WINDOW_HOURS: "1"
  MIN_DURATION_MINUTES: "15"
  MAX_DURATION_MINUTES: "480"
  LOGIN_HANDLER_MS_URL: "http://login-handler-ms.login-handler-ms.svc.cluster.local:8001"
  NOTIFICACIONES_MS_URL: "http://notificaciones-ms.notificaciones-ms.svc.cluster.local:8003"
---
# ── Application ────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: detector-anomalias-ms
  namespace: detector-anomalias-ms
  labels:
    app: detector-anomalias-ms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: detector-anomalias-ms
  template:
    metadata:
      labels:
        app: detector-anomalias-ms
    spec:
      initContainers:
        - name: wait-for-db
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h 192.168.58.127 -p 5432 -U postgres; do
                echo "DB not ready, retrying..."; sleep 2
              done
              echo "DB ready!"
      containers:
        - name: detector-anomalias-ms
          image: detector_anomalias_ms:latest  # Replace with your registry image
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef:
                name: detector-anomalias-ms-config
            - secretRef:
                name: detector-anomalias-ms-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: detector-anomalias-ms
  namespace: detector-anomalias-ms
spec:
  selector:
    app: detector-anomalias-ms
  ports:
    - port: 8002
      targetPort: 8002
---
# ── Ingress ────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: detector-anomalias-ms-ingress
  namespace: detector-anomalias-ms
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: api.experiment.local
      http:
        paths:
          - path: /detector(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: detector-anomalias-ms
                port:
                  number: 8002