services:
  postgresdb:
    image: postgres:16
    container_name: postgresdb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 2s
      timeout: 3s
      retries: 30

  users_ms:
    build:
      context: ./users_ms
    container_name: users_ms
    environment:
      POSTGRES_HOST: postgresdb
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      DB_CONNECT_RETRIES: "30"
      DB_CONNECT_DELAY_SECONDS: "1"
      HOSPEDAJES_MS_URL: http://hospedajes_ms:8000
    ports:
      - "8001:8000"
    depends_on:
      postgresdb:
        condition: service_healthy

  hospedajes_ms:
    build:
      context: ./hospedajes_ms
    container_name: hospedajes_ms
    environment:
      POSTGRES_HOST: postgresdb
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      DB_CONNECT_RETRIES: "30"
      DB_CONNECT_DELAY_SECONDS: "1"
      USERS_MS_URL: http://users_ms:8000
    ports:
      - "8002:8000"
    depends_on:
      postgresdb:
        condition: service_healthy
