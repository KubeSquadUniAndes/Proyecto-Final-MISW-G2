apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservations-service
  namespace: travelhub
  labels:
    app: reservations-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reservations-service
  template:
    metadata:
      labels:
        app: reservations-service
    spec:
      containers:
        - name: reservations
          image: travelhub/reservations-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: reservations-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: ENCRYPTION_KEY
            - name: DATABASE_URL
              value: "postgresql+asyncpg://travelhub:$(POSTGRES_PASSWORD)@postgres-service:5432/travelhub"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
