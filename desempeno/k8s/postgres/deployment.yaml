apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: travelhub
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      initContainers:
        - name: generate-ssl-certs
          image: postgres:16-alpine
          command: ['sh', '-c']
          args:
            - |
              apk add --no-cache openssl &&
              openssl req -new -x509 -days 365 -nodes \
                -out /certs/server.crt \
                -keyout /certs/server.key \
                -subj "/CN=postgres-service.travelhub.svc.cluster.local" &&
              chmod 600 /certs/server.key &&
              chmod 644 /certs/server.crt &&
              chown 70:70 /certs/server.key /certs/server.crt
          volumeMounts:
            - name: postgres-certs
              mountPath: /certs
      containers:
        - name: postgres
          image: postgres:16-alpine
          args:
            - "-c"
            - "ssl=on"
            - "-c"
            - "ssl_cert_file=/certs/server.crt"
            - "-c"
            - "ssl_key_file=/certs/server.key"
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
            - name: postgres-certs
              mountPath: /certs
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - travelhub
                - -d
                - travelhub
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - travelhub
                - -d
                - travelhub
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: init-scripts
          configMap:
            name: postgres-config
            items:
              - key: init-db.sql
                path: init-db.sql
        - name: postgres-certs
          emptyDir: {}
