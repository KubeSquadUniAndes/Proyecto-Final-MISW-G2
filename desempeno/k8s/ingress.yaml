apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: travelhub-ingress
  namespace: travelhub
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - host: travelhub.local
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: reservations-service
                port:
                  number: 80
