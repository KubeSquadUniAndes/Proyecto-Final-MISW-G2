apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: travelhub
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
    scrape_configs:
      - job_name: 'reservations-service'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['reservations-service:80']
